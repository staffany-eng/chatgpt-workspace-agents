interface:
  display_name: "Apify Instagram Scraper"
  short_description: "Scrape public Instagram data via Apify"
  default_prompt: "Use $apify-instagram-scraper to collect public Instagram data with Apify and summarize the dataset output."

dependencies:
  tools:
    - type: "mcp"
      value: "apify"
      description: "Apify MCP server for Actor discovery, Actor calls, and dataset retrieval"
      transport: "streamable_http"
      url: "https://mcp.apify.com"
