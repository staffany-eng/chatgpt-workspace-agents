# Non-secret Hermes profile template for StaffAny Hermes Data Bot.
# Apply on hermes-data-bot-poc only, under the cloud profile
# ~/.hermes/profiles/staffanydatabot/config.yaml. Do not create a Mac-local
# staffanydatabot profile.

terminal:
  cwd: "~/agent-builder/apps/hermes-data-bot"

security:
  redact_secrets: true

display:
  personality: "concise"
  busy_input_mode: "queue"
  interim_assistant_messages: false
  # Keep Slack output quiet and deterministic. Setting global tool_progress can
  # leak tool calls such as skill_view into Slack threads.
  platforms:
    slack:
      tool_progress: "off"
      streaming: false

model:
  default: "claude-sonnet-4-6"
  provider: "anthropic"

agent:
  api_max_retries: 3

cron:
  max_parallel_jobs: 1

kanban:
  dispatch_in_gateway: false

slack:
  require_mention: true
  reactions: false

mcp_servers:
  staffany_bigquery:
    url: "https://bq-mcp-proxy-1093387803298.asia-southeast1.run.app/mcp"
    headers:
      Authorization: "Bearer ${MCP_STAFFANY_BIGQUERY_API_KEY}"
    enabled: true
    timeout: 180
    connect_timeout: 60
    tools:
      include:
        - "list_dataset_ids"
        - "list_table_ids"
        - "get_table_info"
        - "execute_sql_readonly"
      resources: false
      prompts: false
    tool_allowlist:
      - "list_dataset_ids"
      - "list_table_ids"
      - "get_table_info"
      - "execute_sql_readonly"
  staffany_slack_context:
    description: "Read-only selected Slack thread context adapter for Da Ta Hermz."
    command: "/home/leekaiyi/.hermes/hermes-agent/venv/bin/python"
    args:
      - "/home/leekaiyi/.hermes/profiles/staffanydatabot/source/hermes-data-bot/runtime/mcp/staffany_slack_context_server.py"
    timeout: 60
    env:
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN}"
      SLACK_HOME_CHANNEL: "${SLACK_HOME_CHANNEL}"
      # Keep normal replies home-channel gated, but allow explicitly selected
      # public source threads that the bot token can already read.
      STAFFANY_DATA_BOT_SLACK_CONTEXT_CHANNEL_IDS: "C0AU19E6T0C,C0A0V39AK44,C0A0PETSFJS"
    auth_metadata:
      type: "bot_token_env"
      env: "SLACK_BOT_TOKEN"
      configured_channel_ids_env: "STAFFANY_DATA_BOT_SLACK_CONTEXT_CHANNEL_IDS"
      fallback_channel_ids_env: "SLACK_HOME_CHANNEL"
    access_policy:
      mode: "selected_thread_read_only"
      configured_channels_only: true
      public_channels_only: true
      max_thread_context_messages: 50
      safe_summaries_permalinks_only: true
      raw_transcript_persistence: false
      slack_posting: false
      workspace_search: false
      reactions: false
      pins: false
      user_token_fallback: false
      slack_connector_fallback: false
    tool_allowlist:
      - "get_current_slack_thread_context"
      - "get_selected_slack_thread_context"
  staffany_c360:
    description: "Read-only Customer 360 current-customer universe adapter for Da Ta Hermz."
    command: "/home/leekaiyi/.hermes/hermes-agent/venv/bin/python"
    args:
      - "/home/leekaiyi/.hermes/profiles/staffanydatabot/source/hermes-data-bot/runtime/mcp/staffany_c360_server.py"
    timeout: 60
    env:
      CUSTOMER360_BASE_URL: "${CUSTOMER360_BASE_URL}"
      CUSTOMER360_INTERNAL_API_TOKEN: "${CUSTOMER360_INTERNAL_API_TOKEN}"
    auth_metadata:
      type: "internal_token_env"
      base_url_env: "CUSTOMER360_BASE_URL"
      token_env: "CUSTOMER360_INTERNAL_API_TOKEN"
      header: "X-Customer360-Internal-Token"
    access_policy:
      mode: "customer360_current_customer_universe_read_only"
      route_allowlist:
        - "/api/current-customer-orgs"
      custom_internal_header_only: true
      browser_cookie: false
      personal_customer360_session: false
      write_operations: false
      raw_source_pack_access: false
    tool_allowlist:
      - "list_current_customer_orgs"
  staffany_data_learning:
    description: "Reviewed learning-candidate adapter for Da Ta Hermz."
    command: "/home/leekaiyi/.hermes/hermes-agent/venv/bin/python"
    args:
      - "/home/leekaiyi/.hermes/profiles/staffanydatabot/source/hermes-data-bot/runtime/mcp/staffany_data_learning_server.py"
    timeout: 60
    env:
      HERMES_PROFILE: "staffanydatabot"
      STAFFANY_DATA_LEARNING_CANDIDATES_DIR: "/home/leekaiyi/.hermes/profiles/staffanydatabot/runtime/lesson-candidates"
    access_policy:
      mode: "reviewed_learning_candidates_runtime_only"
      default_candidates_dir: "~/.hermes/profiles/staffanydatabot/runtime/lesson-candidates"
      record_status: "pending_review"
      valid_statuses:
        - "pending_review"
        - "needs_more_evidence"
        - "approved_for_repo_promotion"
        - "rejected"
        - "promoted"
      review_status_tool: "update_staffany_data_lesson_candidate_status"
      review_approval_marker: "human reviewed lesson"
      auto_behavior_change: false
      self_approval: false
      honcho_used_as_source_of_truth: false
      raw_slack_transcript_persistence: false
      raw_query_row_persistence: false
      sensitive_data_persistence: false
      kanban_dispatch: false
      persistent_goal_continuation: false
      self_evolution_gepa: false
    tools:
      include:
        - "record_staffany_data_lesson_candidate"
        - "list_staffany_data_lesson_candidates"
        - "read_staffany_data_lesson_candidate"
        - "update_staffany_data_lesson_candidate_status"
      resources: false
      prompts: false
    tool_allowlist:
      - "record_staffany_data_lesson_candidate"
      - "list_staffany_data_lesson_candidates"
      - "read_staffany_data_lesson_candidate"
      - "update_staffany_data_lesson_candidate_status"
  staffany_google_sheets:
    description: "Creation-only Google Sheets output adapter for Da Ta Hermz using team@staffany.com."
    command: "/home/leekaiyi/.hermes/hermes-agent/venv/bin/python"
    args:
      - "/home/leekaiyi/.hermes/profiles/staffanydatabot/source/hermes-shared/google-sheets-output/runtime/mcp/staffany_google_sheets_server.py"
    timeout: 120
    env:
      HERMES_PROFILE: "staffanydatabot"
      GOOGLE_SHEETS_TOKEN_FILE: "${GOOGLE_SHEETS_TOKEN_FILE}"
      GOOGLE_SHEETS_CLIENT_SECRET_FILE: "${GOOGLE_SHEETS_CLIENT_SECRET_FILE}"
      GOOGLE_SHEETS_ACCOUNT_EMAIL: "team@staffany.com"
      GOOGLE_SHEETS_OUTPUT_FOLDER_ID: "${GOOGLE_SHEETS_OUTPUT_FOLDER_ID}"
      GOOGLE_SHEETS_OUTPUT_SHARE_EMAILS: "${GOOGLE_SHEETS_OUTPUT_SHARE_EMAILS}"
      GOOGLE_SHEETS_OUTPUT_SHARE_ROLE: "${GOOGLE_SHEETS_OUTPUT_SHARE_ROLE}"
    auth_metadata:
      type: "oauth_token_file"
      account: "team@staffany.com"
      token_file_env: "GOOGLE_SHEETS_TOKEN_FILE"
      client_secret_file_env: "GOOGLE_SHEETS_CLIENT_SECRET_FILE"
      output_folder_id_env: "GOOGLE_SHEETS_OUTPUT_FOLDER_ID"
      output_share_emails_env: "GOOGLE_SHEETS_OUTPUT_SHARE_EMAILS"
    access_policy:
      mode: "google_sheets_output_create_only"
      account_email: "team@staffany.com"
      service_account: false
      required_scopes:
        - "https://www.googleapis.com/auth/spreadsheets"
        - "https://www.googleapis.com/auth/drive.file"
      requires_output_folder_or_share_target: true
      create_spreadsheets: true
      edit_existing_spreadsheets: false
      read_arbitrary_spreadsheets: false
      user_token_fallback: false
      slack_connector_fallback: false
      max_tabs: 5
      max_rows_per_tab: 5000
      max_total_cells: 100000
      max_cell_chars: 2000
      formula_like_cells_escaped: true
    tools:
      include:
        - "check_google_sheets_output_access"
        - "create_spreadsheet_from_rows"
      resources: false
      prompts: false
    tool_allowlist:
      - "check_google_sheets_output_access"
      - "create_spreadsheet_from_rows"

gateway:
  slack:
    enabled: true
    app_token_env: "SLACK_APP_TOKEN"
    bot_token_env: "SLACK_BOT_TOKEN"
    allowed_users_env: "SLACK_ALLOWED_USERS"
    channel: "#da-ta-hermz-testing"
