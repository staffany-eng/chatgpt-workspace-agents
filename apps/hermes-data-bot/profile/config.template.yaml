# Non-secret Hermes profile template for StaffAny Hermes Data Bot.
# Copy relevant values into ~/.hermes/profiles/staffanydatabot/config.yaml and verify
# exact key support with the installed Hermes version before restarting the gateway.

terminal:
  cwd: "~/agent-builder/apps/hermes-data-bot"

security:
  redact_secrets: true

display:
  personality: "concise"
  busy_input_mode: "queue"
  interim_assistant_messages: false
  # Keep Slack output quiet and deterministic. Setting global tool_progress can
  # leak tool calls such as skill_view into Slack threads.
  platforms:
    slack:
      tool_progress: "off"
      streaming: false

model:
  default: "claude-sonnet-4-6"
  provider: "anthropic"

agent:
  api_max_retries: 3

kanban:
  dispatch_in_gateway: false

slack:
  require_mention: true
  reactions: false

mcp_servers:
  staffany_bigquery:
    url: "https://bq-mcp-proxy-1093387803298.asia-southeast1.run.app/mcp"
    auth_metadata:
      type: "bearer_env"
      env: "MCP_STAFFANY_BIGQUERY_API_KEY"
    tool_allowlist:
      - "list_dataset_ids"
      - "list_table_ids"
      - "get_table_info"
      - "execute_sql_readonly"

gateway:
  slack:
    enabled: true
    app_token_env: "SLACK_APP_TOKEN"
    bot_token_env: "SLACK_BOT_TOKEN"
    allowed_users_env: "SLACK_ALLOWED_USERS"
    channel: "#da-ta-hermz-testing"
