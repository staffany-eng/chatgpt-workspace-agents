# Non-secret Hermes profile template for NurtureAny Sales Bot.
# Copy relevant values into ~/.hermes/profiles/nurtureanysalesbot/config.yaml and verify
# exact key support with the installed Hermes version before restarting the gateway.

terminal:
  cwd: "~/agent-builder/apps/nurtureany-sales-bot"

security:
  redact_secrets: true

display:
  busy_input_mode: "queue"
  tool_progress: "off"
  tool_preview_length: 0

model:
  default: "claude-sonnet-4-6"
  provider: "anthropic"

nurtureany:
  supported_countries:
    - "Singapore"
    - "Malaysia"
    - "Indonesia"
  access_policy:
    runtime_policy_env: "NURTUREANY_ACCESS_POLICY_PATH"
    template_file: "runtime/access-policy.template.json"
    owner_mapping_source: "hubspot_owners_api"
    unclassified_hubspot_owners: "blocked"
    ae_scope:
      type: "explicit_sales_rep_slack_email_to_hubspot_owner_email_to_hubspot_owner_id"
      company_owner_property: "hubspot_owner_id"
      allowed_accounts: "own_hubspot_target_accounts_only"
    manager_scope:
      access: "country_scoped_team_read_only"
      hubspot_writeback_preview: false
    overall_admins:
      - "eugene@staffany.com"
      - "kaiyi@staffany.com"
    regional_managers:
      - email: "kerren.fong@staffany.com"
        countries:
          - "Singapore"
          - "Malaysia"
      - email: "sarah@staffany.com"
        countries:
          - "Indonesia"
    sales_reps:
      - slack_email: "example.sg.rep@example.invalid"
        hubspot_owner_email: "example.sg.owner@example.invalid"
        countries:
          - "Singapore"
        active: true
  approval_policy:
    first_slack_request: "plan_first"
    first_execution_approval: "run"
    hubspot_mutations: "explicit_preview_approval"
    external_message_sending: "disabled"
  honcho:
    enabled: false
    reason: "V1 uses deterministic config and HubSpot as source of truth."

mcp_servers:
  hubspot_nurtureany:
    description: "Custom HubSpot adapter for target-account nurture workflows."
    command: "/Users/leekaiyi/.hermes/hermes-agent/venv/bin/python"
    args:
      - "/Users/leekaiyi/workspace/agent builder/apps/nurtureany-sales-bot/runtime/mcp/hubspot_nurtureany_server.py"
    auth:
      type: "bearer_env"
      env: "HUBSPOT_PRIVATE_APP_TOKEN"
    tool_allowlist:
      - "list_my_target_accounts"
      - "list_team_target_accounts"
      - "audit_hubspot_owner_roster"
      - "get_account_context"
      - "list_sales_followup_tasks"
      - "score_nurture_accounts"
      - "find_contact_gaps"
      - "generate_free_search_tasks"
      - "review_public_enrichment_evidence"
      - "draft_nurture_message"
      - "plan_hubspot_writeback"
    mutation_tools_disabled_until_write_phase:
      - "create_hubspot_task"
      - "append_hubspot_note"
      - "update_nurture_fields"

  lusha_nurtureany:
    description: "Cost-controlled Lusha adapter for selected decision-maker lookup, reveal approval, and credit reporting."
    command: "/Users/leekaiyi/.hermes/hermes-agent/venv/bin/python"
    args:
      - "/Users/leekaiyi/workspace/agent builder/apps/nurtureany-sales-bot/runtime/mcp/lusha_nurtureany_server.py"
    auth:
      type: "api_key_env"
      env: "LUSHA_API_KEY"
    cost_policy:
      max_search_companies: 5
      max_candidates_per_company: 5
      max_reveal_contacts: 3
      require_credit_report: true
      recommend_low_monthly_dashboard_limit: true
    pii_policy:
      selected_pii_in_internal_slack: true
      bulk_contact_exports: false
      phone_reveal_requires_flag: true
    tool_allowlist:
      - "search_lusha_decision_maker_candidates"
      - "reveal_lusha_contact_details"
      - "get_lusha_credit_usage"

  exa_nurtureany:
    description: "LinkedIn-safe Exa People Search adapter for public decision-maker candidate discovery."
    command: "/Users/leekaiyi/.hermes/hermes-agent/venv/bin/python"
    args:
      - "/Users/leekaiyi/workspace/agent builder/apps/nurtureany-sales-bot/runtime/mcp/exa_nurtureany_server.py"
    auth:
      type: "api_key_env"
      env: "EXA_API_KEY"
    cost_policy:
      max_search_companies: 5
      max_candidates_per_company: 5
      require_cost_report: true
      estimate_before_run: true
    pii_policy:
      selected_pii_in_internal_slack: false
      bulk_contact_exports: false
      no_email_or_phone_reveal: true
      linkedin_urls_are_manual_check_only: true
    tool_allowlist:
      - "search_exa_people_candidates"

  staffany_bigquery:
    description: "Read-only C360 enrichment source for MRR, renewal timing, account owner, and PSM context."
    url: "https://bq-mcp-proxy-1093387803298.asia-southeast1.run.app/mcp"
    auth:
      type: "bearer_env"
      env: "MCP_STAFFANY_BIGQUERY_API_KEY"
    tool_allowlist:
      - "list_dataset_ids"
      - "list_table_ids"
      - "get_table_info"
      - "execute_sql_readonly"

  google_calendar_nurtureany:
    description: "Read-only Google Calendar event context from team@staffany.com for event invite, attendance, and follow-up nurture."
    command: "/Users/leekaiyi/.hermes/hermes-agent/venv/bin/python"
    args:
      - "/Users/leekaiyi/workspace/agent builder/apps/nurtureany-sales-bot/runtime/mcp/google_calendar_nurtureany_server.py"
    auth:
      type: "oauth_token_file"
      account: "team@staffany.com"
      token_file_env: "GOOGLE_CALENDAR_TOKEN_FILE"
      client_secret_file_env: "GOOGLE_CALENDAR_CLIENT_SECRET_FILE"
    access_policy:
      mode: "read_only"
      calendar_account_email: "team@staffany.com"
      max_calendars: 5
      max_events_per_calendar: 50
      event_mutations: false
      attendee_exports: false
    tool_allowlist:
      - "list_google_calendar_events"

  luma_nurtureany:
    description: "Read-only Luma event context adapter for RSVP, attendance, and no-show nurture."
    command: "/Users/leekaiyi/.hermes/hermes-agent/venv/bin/python"
    args:
      - "/Users/leekaiyi/workspace/agent builder/apps/nurtureany-sales-bot/runtime/mcp/luma_nurtureany_server.py"
    auth:
      type: "api_key_env"
      env: "LUMA_API_KEY"
      header: "x-luma-api-key"
    access_policy:
      mode: "read_only"
      base_url: "https://public-api.luma.com"
      requires_scoped_hubspot_companies: true
      attendance_definition: "checked_in_at_present"
      max_events: 50
      default_event_limit: 20
      max_events_for_context: 20
      max_guests_per_event: 250
      country_tags:
        - "Singapore"
        - "Malaysia"
        - "Indonesia"
      location_tags:
        - "Singapore"
        - "Jakarta"
        - "Bali"
        - "Kuala Lumpur"
      location_tag_country_map:
        Singapore: "Singapore"
        Jakarta: "Indonesia"
        Bali: "Indonesia"
        Kuala Lumpur: "Malaysia"
      event_type_tags:
        - "Sports"
        - "Appreciation Afternoon"
        - "HR Happy Hour"
        - "Leaders Lounge"
      preferred_event_filter: "event_tags"
      event_mutations: false
      raw_attendee_exports: false
      hubspot_writeback: "none"
    tool_allowlist:
      - "list_luma_events"
      - "get_luma_event_context"

gateway:
  slack:
    enabled: true
    app_token_env: "SLACK_APP_TOKEN"
    bot_token_env: "SLACK_BOT_TOKEN"
    allowed_users_env: "SLACK_ALLOWED_USERS"
    channels:
      - "#kaiyi-bot-testing"
      - "#team-rev-onboarding-sgmy-sales"
      - "#team-rev-bd-sgmy-proj12"
      - "#team-rev-bd-id-proj18"
