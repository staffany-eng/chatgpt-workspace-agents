terminal:
  cwd: /home/leekaiyi/.hermes/profiles/launchbot/source/launchbot
security:
  redact_secrets: true
display:
  busy_input_mode: queue
  interim_assistant_messages: false
  streaming: false
  tool_progress: "off"
  platforms:
    slack:
      streaming: false
      tool_progress: "off"
platforms:
  slack:
    gateway_restart_notification: false
slack:
  require_mention: true
  allowed_channels: "C0B32M34J3W,C0AJAUNCEL8,C01RZ7SHC8K,CF8PK6V4J"
  reactions: false
cron:
  max_parallel_jobs: 1
sources:
  pantheon:
    description: "StaffAny product behavior source of truth for help article drafting."
    repo_url: "git@github.com:staffany-eng/pantheon.git"
    branch: "develop"
    checkout_env: "LAUNCHBOT_PANTHEON_REPO_DIR"
    default_checkout: "~/.hermes/profiles/launchbot/source/pantheon"
    deploy_key_env: "LAUNCHBOT_PANTHEON_SSH_KEY"
    default_deploy_key: "~/.hermes/profiles/launchbot/ssh/pantheon_deploy_key"
    status_json: "~/.hermes/profiles/launchbot/runtime/pantheon-repo-status.json"
kanban:
  dispatch_in_gateway: false
model:
  default: "claude-sonnet-4-6"
  provider: "anthropic"
mcp_servers:
  launchbot_ker:
    description: "Read-only Slack thread to Jira KER lookup adapter for Launchbot."
    command: "/home/leekaiyi/.hermes/hermes-agent/venv/bin/python"
    args:
      - "/home/leekaiyi/.hermes/profiles/launchbot/source/launchbot/runtime/mcp/launchbot_ker_server.py"
    timeout: 120
    tool_allowlist:
      - "find_ker_ticket_from_slack_thread"
      - "lookup_ker_ticket_by_key"
    auth_metadata:
      slack:
        type: "bot_token_env"
        env: "SLACK_BOT_TOKEN"
      jira:
        type: "basic_auth_env"
        base_url_env: "JIRA_BASE_URL"
        email_env: "JIRA_EMAIL"
        api_token_env: "JIRA_API_TOKEN"
    access_policy:
      mode: "read_only"
      configured_channel_ids_env: "LAUNCHBOT_KER_ALLOWED_CHANNEL_IDS"
      default_channel_ids:
        - "C0B32M34J3W"
        - "C0AJAUNCEL8"
        - "C01RZ7SHC8K"
      no_slack_connector_fallback: true
      no_user_token_fallback: true
  launchbot_feature_intake:
    description: "Guarded Slack thread to Jira Product Discovery KER intake adapter for Launchbot."
    command: "/home/leekaiyi/.hermes/hermes-agent/venv/bin/python"
    args:
      - "/home/leekaiyi/.hermes/profiles/launchbot/source/launchbot/runtime/mcp/launchbot_feature_intake_server.py"
    timeout: 120
    tool_allowlist:
      - "preview_feature_intake_from_slack_thread"
      - "create_feature_intake_from_slack_thread"
    auth_metadata:
      slack:
        type: "bot_token_env"
        env: "SLACK_BOT_TOKEN"
      jira:
        type: "basic_auth_env"
        base_url_env: "JIRA_BASE_URL"
        email_env: "JIRA_EMAIL"
        api_token_env: "JIRA_API_TOKEN"
    access_policy:
      mode: "confirmed_jpd_intake_create"
      configured_channel_ids_env: "LAUNCHBOT_FEATURE_INTAKE_ALLOWED_CHANNEL_IDS"
      default_channel_ids:
        - "C0B32M34J3W"
        - "CF8PK6V4J"
      project_key: "KER"
      issue_type_id: "10043"
      slack_prd_field_id: "customfield_10080"
      required_confirmation: "create intake"
      preview_first: true
      no_slack_post_from_mcp: true
      no_jira_comments: true
      no_jira_transitions: true
      no_jira_assignment: true
      no_slack_connector_fallback: true
      no_user_token_fallback: true
  launchbot_help_article:
    description: "Draft-only registered video-slot updater for StaffAny help articles."
    command: "/home/leekaiyi/.hermes/hermes-agent/venv/bin/python"
    args:
      - "/home/leekaiyi/.hermes/profiles/launchbot/source/launchbot/runtime/mcp/launchbot_help_article_server.py"
    timeout: 120
    tool_allowlist:
      - "preview_help_article_video_update"
      - "create_help_article_video_update_draft"
    auth_metadata:
      intercom:
        type: "bearer_token_env"
        env: "LAUNCH_STEP3_INTERCOM_ACCESS_TOKEN"
    access_policy:
      mode: "draft_only_registered_video_slots"
      registry_path: "/home/leekaiyi/.hermes/profiles/launchbot/source/launchbot/skills/help-article-generator/references/video-placement-registry.json"
      supported_provider: "loom"
      required_confirmation: "draft it"
      allow_article_text_rewrite: false
      allow_publish: false
      allow_delete: false
      allow_tag_mutation: false
      allow_collection_mutation: false
gateway:
  slack:
    enabled: true
    app_token_env: "SLACK_APP_TOKEN"
    bot_token_env: "SLACK_BOT_TOKEN"
    allowed_users_env: "SLACK_ALLOWED_USERS"
    channel: "#launch-bot-testing"
SLACK_HOME_CHANNEL: "C0B32M34J3W"
SLACK_HOME_CHANNEL_NAME: "launch-bot-testing"
LAUNCHBOT_KER_ALLOWED_CHANNEL_IDS: "C0B32M34J3W,C0AJAUNCEL8,C01RZ7SHC8K"
LAUNCHBOT_FEATURE_INTAKE_ALLOWED_CHANNEL_IDS: "C0B32M34J3W,CF8PK6V4J"
